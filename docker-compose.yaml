version: "3.9"

services:
  web1:
    build: .
    image: k8s-demo-app:local
    container_name: webapp1
    env_file:
      - .env
    environment:
      APP_MESSAGE: "Hello from webapp1"
    ports:
      - "3010:3000"
    depends_on:
      - mongo

  web2:
    build: .
    image: k8s-demo-app:local
    container_name: webapp2
    env_file:
      - .env
    environment:
      APP_MESSAGE: "Hello from webapp2"
    ports:
      - "3020:3000"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
